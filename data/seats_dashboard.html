<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>동작구립도서관 좌석 현황 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; color: #1a365d; }
    .subtitle { text-align: center; font-size: 0.82rem; color: #718096; margin-bottom: 24px; }

    /* 섹션 공통 */
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 14px;
    }

    /* 날짜 탭 */
    .date-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .date-tab {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid #cbd5e0;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      color: #4a5568;
      transition: all .15s;
    }
    .date-tab:hover { border-color: #4299e1; color: #2b6cb0; }
    .date-tab.active { background: #4299e1; border-color: #4299e1; color: white; font-weight: 600; }

    /* 요일별 분석 */
    .dow-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .dow-tab {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1.5px solid #cbd5e0;
      background: white;
      font-size: 0.78rem;
      cursor: pointer;
      color: #4a5568;
      transition: all .15s;
    }
    .dow-tab:hover { border-color: #48bb78; color: #276749; }
    .dow-tab.active { background: #48bb78; border-color: #48bb78; color: white; font-weight: 600; }

    /* 아코디언 테이블 */
    .accordion-date {
      width: 100%;
      background: #edf2f7;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      transition: background .15s;
    }
    .accordion-date:hover { background: #e2e8f0; }
    .accordion-date .arrow { font-size: 0.7rem; color: #718096; transition: transform .2s; }
    .accordion-date.open .arrow { transform: rotate(180deg); }
    .accordion-body { display: none; margin-bottom: 12px; overflow-x: auto; }
    .accordion-body.open { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead tr { background: #f7fafc; }
    th, td { padding: 7px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    th { font-weight: 600; color: #4a5568; }
    td.room { text-align: left; }
    tr:hover td { background: #f7fafc; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .status-full   { background: #fed7d7; color: #c53030; }
    .status-busy   { background: #feebc8; color: #c05621; }
    .status-normal { background: #c6f6d5; color: #276749; }

    footer { text-align: center; font-size: 0.72rem; color: #a0aec0; margin-top: 20px; }
  </style>
</head>
<body>

<h1>📚 동작구립도서관 좌석 현황 대시보드</h1>
<p class="subtitle" id="subtitle"></p>

<!-- 날짜별 라인 차트 (룸별 3분할) -->
<div class="section">
  <div class="section-title">⏱ 날짜별 좌석 점유율 추이</div>
  <div class="date-tabs" id="dateTabs"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
    <div>
      <div style="font-size:0.78rem;font-weight:600;color:#2b6cb0;margin-bottom:8px;text-align:center;">1층 로비(나모아래)</div>
      <canvas id="chart-1층 로비(나모아래)" height="160"></canvas>
    </div>
    <div>
      <div style="font-size:0.78rem;font-weight:600;color:#276749;margin-bottom:8px;text-align:center;">1층 디지털학습실</div>
      <canvas id="chart-1층 디지털학습실" height="160"></canvas>
    </div>
    <div>
      <div style="font-size:0.78rem;font-weight:600;color:#c05621;margin-bottom:8px;text-align:center;">3층 자율학습실</div>
      <canvas id="chart-3층 자율학습실" height="160"></canvas>
    </div>
  </div>
</div>

<!-- 요일별 평균 분석 -->
<div class="section">
  <div class="section-title">📅 요일별 시간대 평균 점유율 — 언제 사람이 많나?</div>
  <div class="dow-tabs" id="dowTabs"></div>
  <canvas id="dowChart" height="70"></canvas>
</div>

<!-- 상세 데이터 아코디언 -->
<div class="section">
  <div class="section-title">📋 날짜별 상세 데이터</div>
  <div id="accordion"></div>
</div>

<footer>seats.csv 기반 · 10분마다 자동 갱신</footer>

<script>
const roomChartInstances = {};
let dowChartInstance = null;

const roomColors = {
  '1층 로비(나모아래)': { border: '#4299e1', bg: 'rgba(66,153,225,0.15)' },
  '1층 디지털학습실':   { border: '#48bb78', bg: 'rgba(72,187,120,0.15)' },
  '3층 자율학습실':    { border: '#ed8936', bg: 'rgba(237,137,54,0.15)'  },
};

const DOW_LABELS = ['일', '월', '화', '수', '목', '금', '토'];
const DOW_COLORS = ['#fc8181','#68d391','#63b3ed','#f6ad55','#b794f4','#76e4f7','#fbd38d'];

function pct(row) {
  if (row.total_seats === 0) return 0;
  return row.waiting > 0 ? 100 : Math.round(row.used_seats / row.total_seats * 100);
}

function dateToKSTDow(dateStr) {
  // dateStr: "YYYY-MM-DD"
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).getDay(); // 0=일 6=토
}

// ── 날짜별 룸별 3분할 차트 ───────────────────────────────────────
function renderRoomChart(room, dayData) {
  const col   = roomColors[room] || { border: '#aaa', bg: 'rgba(170,170,170,0.1)' };
  const times = [...new Set(dayData.map(d => d.collected_at))].sort();
  const [r, g, b] = col.border.slice(1).match(/.{2}/g).map(x => parseInt(x, 16));

  const datasets = [
    {
      type: 'bar',
      label: '대기',
      data: times.map(t => {
        const row = dayData.find(d => d.collected_at === t && d.room_name === room);
        return row ? row.waiting : 0;
      }),
      backgroundColor: `rgba(${r},${g},${b},0.2)`,
      borderColor: col.border,
      borderWidth: 1,
      borderRadius: 3,
      yAxisID: 'yWait',
      order: 2,
    },
    {
      label: '점유율',
      data: times.map(t => {
        const row = dayData.find(d => d.collected_at === t && d.room_name === room);
        return row ? pct(row) : null;
      }),
      borderColor: col.border,
      backgroundColor: col.bg,
      fill: true,
      tension: 0.3,
      pointRadius: 2,
      pointHoverRadius: 4,
      yAxisID: 'yPct',
      order: 1,
    },
  ];

  const canvasId = 'chart-' + room;
  if (roomChartInstances[room]) roomChartInstances[room].destroy();
  roomChartInstances[room] = new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels: times.map(t => t.slice(11, 16)), datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label: ctx => ctx.dataset.yAxisID === 'yPct'
            ? ` 점유율: ${ctx.parsed.y}%`
            : ` 대기: ${ctx.parsed.y}명`
        }}
      },
      scales: {
        yPct:  { type: 'linear', position: 'left',  min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 10 } } },
        yWait: { type: 'linear', position: 'right', min: 0, ticks: { stepSize: 1, callback: v => v + '명', font: { size: 10 } }, grid: { drawOnChartArea: false } },
        x:     { ticks: { font: { size: 10 }, maxRotation: 45 } },
      }
    }
  });
}

function renderLineChart(data, selectedDate) {
  const dayData = data.filter(d => d.collected_at.startsWith(selectedDate));
  const rooms   = [...new Set(data.map(d => d.room_name))];
  rooms.forEach(room => renderRoomChart(room, dayData));
}

// ── 요일별 평균 점유율 차트 ────────────────────────────────────────
function renderDowChart(data, selectedDow) {
  // 선택 요일에 해당하는 날짜들
  const dates   = [...new Set(data.map(d => d.collected_at.slice(0, 10)))];
  const dowDates = dates.filter(d => dateToKSTDow(d) === selectedDow);

  if (dowDates.length === 0) {
    if (dowChartInstance) dowChartInstance.destroy();
    dowChartInstance = null;
    return;
  }

  // 해당 요일 데이터만
  const dowData = data.filter(d => dowDates.includes(d.collected_at.slice(0, 10)));

  // 시간대 목록 (HH:MM)
  const timeSlots = [...new Set(dowData.map(d => d.collected_at.slice(11, 16)))].sort();
  const rooms     = [...new Set(dowData.map(d => d.room_name))];

  const datasets = rooms.map(room => {
    const col = roomColors[room] || { border: '#aaa', bg: 'rgba(170,170,170,0.15)' };
    return {
      label: room,
      data: timeSlots.map(t => {
        const rows = dowData.filter(d => d.collected_at.slice(11, 16) === t && d.room_name === room);
        if (!rows.length) return null;
        return Math.round(rows.reduce((s, r) => s + pct(r), 0) / rows.length);
      }),
      borderColor: col.border,
      backgroundColor: col.bg,
      fill: true,
      tension: 0.3,
      pointRadius: 3,
      pointHoverRadius: 5,
    };
  });

  if (dowChartInstance) dowChartInstance.destroy();
  dowChartInstance = new Chart(document.getElementById('dowChart'), {
    type: 'line',
    data: {
      labels: timeSlots,
      datasets,
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top' },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%` } }
      },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, title: { display: true, text: '평균 점유율 (%)' } },
        x: { title: { display: true, text: '시각' } },
      }
    }
  });
}

// ── 아코디언 테이블 ───────────────────────────────────────────────
function renderAccordion(data) {
  const dates = [...new Set(data.map(d => d.collected_at.slice(0, 10)))].sort().reverse();
  const container = document.getElementById('accordion');
  container.innerHTML = '';

  dates.forEach((date, idx) => {
    const dayRows = data.filter(d => d.collected_at.startsWith(date));
    const dayTimes = [...new Set(dayRows.map(d => d.collected_at))].sort().reverse();
    const dow = DOW_LABELS[dateToKSTDow(date)];

    // 요약: 해당 날 평균 점유율
    const avgPct = Math.round(dayRows.reduce((s, r) => s + pct(r), 0) / dayRows.length);

    const btn = document.createElement('button');
    btn.className = 'accordion-date' + (idx === 0 ? ' open' : '');
    btn.innerHTML = `
      <span>${date} (${dow}) &nbsp;<span style="color:#718096;font-weight:400;font-size:0.78rem">평균 점유율 ${avgPct}% · ${dayTimes.length}회 수집</span></span>
      <span class="arrow">▼</span>
    `;

    const body = document.createElement('div');
    body.className = 'accordion-body' + (idx === 0 ? ' open' : '');

    const table = document.createElement('table');
    table.innerHTML = `
      <thead><tr>
        <th>시각</th><th>룸</th><th>전체</th><th>이용중</th><th>여유</th><th>대기</th><th>점유율</th><th>상태</th>
      </tr></thead>
    `;
    const tbody = document.createElement('tbody');

    dayTimes.forEach(t => {
      const roomRows = dayRows.filter(d => d.collected_at === t);
      roomRows.forEach(row => {
        const p    = pct(row);
        const free = row.total_seats - row.used_seats;
        let pillClass, pillText;
        if (p >= 100)     { pillClass = 'status-full';   pillText = '만석'; }
        else if (p >= 80) { pillClass = 'status-busy';   pillText = '혼잡'; }
        else              { pillClass = 'status-normal';  pillText = '여유'; }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${t.slice(11, 16)}</td>
          <td class="room">${row.room_name}</td>
          <td>${row.total_seats}</td>
          <td>${row.used_seats}</td>
          <td>${free}</td>
          <td>${row.waiting > 0 ? `<span style="color:#e53e3e;font-weight:600">${row.waiting}</span>` : '0'}</td>
          <td>${p}%</td>
          <td><span class="pill ${pillClass}">${pillText}</span></td>
        `;
        tbody.appendChild(tr);
      });
    });

    table.appendChild(tbody);
    body.appendChild(table);
    container.appendChild(btn);
    container.appendChild(body);

    btn.addEventListener('click', () => {
      btn.classList.toggle('open');
      body.classList.toggle('open');
    });
  });
}

// ── 전체 렌더링 ───────────────────────────────────────────────────
let currentDate = null;
let currentDow  = null;

function renderDashboard(allData) {
  const data  = allData;
  const dates = [...new Set(data.map(d => d.collected_at.slice(0, 10)))].sort();

  document.getElementById('subtitle').textContent =
    `수집 기간: ${dates[0]} ~ ${dates[dates.length - 1]} · ${dates.length}일치 데이터`;

  // 날짜 탭
  const tabsEl = document.getElementById('dateTabs');
  const prevDate = currentDate && dates.includes(currentDate) ? currentDate : dates[dates.length - 1];
  currentDate = prevDate;
  tabsEl.innerHTML = '';
  dates.slice().reverse().forEach(d => {
    const dow = DOW_LABELS[dateToKSTDow(d)];
    const btn = document.createElement('button');
    btn.className = 'date-tab' + (d === currentDate ? ' active' : '');
    btn.textContent = `${d.slice(5)} (${dow})`;
    btn.addEventListener('click', () => {
      currentDate = d;
      document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLineChart(data, currentDate);
    });
    tabsEl.appendChild(btn);
  });
  renderLineChart(data, currentDate);

  // 요일 탭 — 데이터에 있는 요일만 표시
  const availDows = [...new Set(dates.map(dateToKSTDow))].sort();
  const dowTabsEl = document.getElementById('dowTabs');
  const prevDow = currentDow !== null && availDows.includes(currentDow) ? currentDow : availDows[0];
  currentDow = prevDow;
  dowTabsEl.innerHTML = '';
  availDows.forEach(dow => {
    const cnt = dates.filter(d => dateToKSTDow(d) === dow).length;
    const btn = document.createElement('button');
    btn.className = 'dow-tab' + (dow === currentDow ? ' active' : '');
    btn.textContent = `${DOW_LABELS[dow]}요일 (${cnt}일)`;
    btn.addEventListener('click', () => {
      currentDow = dow;
      document.querySelectorAll('.dow-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDowChart(data, currentDow);
    });
    dowTabsEl.appendChild(btn);
  });
  renderDowChart(data, currentDow);

  // 아코디언
  renderAccordion(data);
}

// ── 데이터 로드 ───────────────────────────────────────────────────
function loadData() {
  fetch('/api/seats')
    .then(r => r.json())
    .then(renderDashboard)
    .catch(() => {
      document.getElementById('subtitle').textContent = '⚠️ 데이터를 불러오지 못했습니다. Flask 서버가 실행 중인지 확인하세요.';
    });
}

loadData();
setInterval(loadData, 10 * 60 * 1000);
</script>
</body>
</html>
