<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>동작구립도서관 좌석 현황 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      padding: 24px;
    }
    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1a365d;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 28px;
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .chart-box.full-width { grid-column: 1 / -1; }
    .chart-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 14px;
    }
    .table-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow-x: auto;
    }
    .table-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead tr { background: #edf2f7; }
    th, td { padding: 8px 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    th { font-weight: 600; color: #4a5568; }
    td.room { text-align: left; }
    tr:hover td { background: #f7fafc; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-full   { background: #fed7d7; color: #c53030; }
    .status-busy   { background: #feebc8; color: #c05621; }
    .status-normal { background: #c6f6d5; color: #276749; }
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #a0aec0;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<h1>📚 동작구립도서관 좌석 현황 대시보드</h1>
<p class="subtitle" id="date-range"></p>

<div class="charts">
  <div class="chart-box full-width">
    <div class="chart-title">⏱ 시간대별 좌석 점유율 추이 (%) — 대기자 있을 경우 100%로 표시</div>
    <canvas id="lineChart" height="60"></canvas>
  </div>
</div>

<div class="table-box">
  <div class="table-title">📋 시간대별 상세 데이터</div>
  <table id="dataTable">
    <thead>
      <tr>
        <th>시각</th>
        <th>룸 이름</th>
        <th>전체 좌석</th>
        <th>이용 중</th>
        <th>여유</th>
        <th>대기</th>
        <th>점유율</th>
        <th>상태</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<footer>seats.csv 기반 · 운영 종료(이용 0석) 시간대 제외 · 수집 주기: 10분</footer>

<script>
const roomColors = {
  '1층 로비(나모아래)': { border: '#4299e1', bg: 'rgba(66,153,225,0.15)' },
  '1층 디지털학습실':   { border: '#48bb78', bg: 'rgba(72,187,120,0.15)' },
  '3층 자율학습실':    { border: '#ed8936', bg: 'rgba(237,137,54,0.15)' },
};

// 점유율 계산 헬퍼 — 대기자 있으면 100% 처리
function pct(row) {
  if (row.total_seats === 0) return 0;
  const raw = Math.round(row.used_seats / row.total_seats * 100);
  return row.waiting > 0 ? 100 : raw;
}

function renderDashboard(allData) {
  // 운영 종료 시간대(모든 룸이 이용 0인 시각) 제외
  const closedTimes = new Set(
    [...new Set(allData.map(d => d.collected_at))].filter(t => {
      const rows = allData.filter(d => d.collected_at === t);
      return rows.every(r => r.used_seats === 0);
    })
  );
  const data = allData.filter(d => !closedTimes.has(d.collected_at));

  const rooms = [...new Set(data.map(d => d.room_name))];
  const times = [...new Set(data.map(d => d.collected_at))].sort();

  document.getElementById('date-range').textContent =
    `수집 기간: ${times[0]} ~ ${times[times.length-1]} (운영 종료 시간대 제외)`;

  // ── 라인 차트: 시간대별 점유율 % + 대기자 수 ──
  const occupancyDatasets = rooms.map(room => {
  const col = roomColors[room];
  return {
    label: room + ' (점유율)',
    data: times.map(t => {
      const r = data.find(d => d.collected_at === t && d.room_name === room);
      return r ? pct(r) : null;
    }),
    borderColor: col.border,
    backgroundColor: col.bg,
    fill: true,
    tension: 0.3,
    pointRadius: 4,
    pointHoverRadius: 6,
    yAxisID: 'yPct',
  };
});

const waitingDatasets = rooms.map(room => {
  const col = roomColors[room];
  return {
    type: 'bar',
    label: room + ' (대기)',
    data: times.map(t => {
      const r = data.find(d => d.collected_at === t && d.room_name === room);
      return r ? r.waiting : 0;
    }),
    backgroundColor: col.border.replace(')', ', 0.25)').replace('rgb(', 'rgba(').replace(/^(#.{6})$/, v => {
      const r = parseInt(v.slice(1,3),16), g = parseInt(v.slice(3,5),16), b = parseInt(v.slice(5,7),16);
      return `rgba(${r},${g},${b},0.25)`;
    }),
    borderColor: col.border,
    borderWidth: 1,
    borderRadius: 3,
    yAxisID: 'yWait',
    order: 2,
  };
});

new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: times.map(t => t.slice(11, 16)),
    datasets: [...waitingDatasets, ...occupancyDatasets],
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { position: 'top' },
      tooltip: {
        callbacks: {
          label: ctx => {
            if (ctx.dataset.yAxisID === 'yPct') return ` ${ctx.dataset.label}: ${ctx.parsed.y}%`;
            return ` ${ctx.dataset.label}: ${ctx.parsed.y}명`;
          }
        }
      }
    },
    scales: {
      yPct: {
        type: 'linear',
        position: 'left',
        min: 0, max: 100,
        ticks: { callback: v => v + '%' },
        title: { display: true, text: '점유율 (%)' },
      },
      yWait: {
        type: 'linear',
        position: 'right',
        min: 0,
        ticks: { stepSize: 1, callback: v => v + '명' },
        title: { display: true, text: '대기자 (명)' },
        grid: { drawOnChartArea: false },
      },
      x: { title: { display: true, text: '시각' } }
    }
  }
});


  // ── 테이블 ──
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';
  [...data].reverse().forEach(row => {
    const p = pct(row);
    const free = row.total_seats - row.used_seats;
    let pillClass, pillText;
    if (p >= 100)     { pillClass = 'status-full';   pillText = '만석'; }
    else if (p >= 80) { pillClass = 'status-busy';   pillText = '혼잡'; }
    else              { pillClass = 'status-normal';  pillText = '여유'; }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.collected_at.slice(11,16)}</td>
      <td class="room">${row.room_name}</td>
      <td>${row.total_seats}</td>
      <td>${row.used_seats}</td>
      <td>${free}</td>
      <td>${row.waiting > 0 ? `<span style="color:#e53e3e;font-weight:600">${row.waiting}</span>` : '0'}</td>
      <td>${p}%</td>
      <td><span class="pill ${pillClass}">${pillText}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

// /api/seats 에서 데이터 fetch, 실패 시 에러 표시
fetch('/api/seats')
  .then(r => r.json())
  .then(renderDashboard)
  .catch(() => {
    document.getElementById('date-range').textContent = '⚠️ 데이터를 불러오지 못했습니다. Flask 서버가 실행 중인지 확인하세요.';
  });
</script>
</body>
</html>
