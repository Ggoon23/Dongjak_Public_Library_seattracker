name: Server Health Check

on:
  schedule:
    - cron: "0 * * * *"   # 매 시간 (UTC)
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check server status
        id: health
        run: |
          body=$(curl -s --max-time 10 "${{ secrets.CLOUDTYPE_URL }}/status" || echo "")
          echo "body: $body"
          if echo "$body" | grep -q '"ok"'; then
            echo "alive=true" >> "$GITHUB_OUTPUT"
            echo "Server is alive"
          else
            echo "alive=false" >> "$GITHUB_OUTPUT"
            echo "Server is down"
          fi

      - name: Notify Slack if down
        if: steps.health.outputs.alive != 'true'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":red_circle: *동작도서관 서버 다운*\nCloudType 서버가 응답하지 않습니다. 확인이 필요합니다."}'
