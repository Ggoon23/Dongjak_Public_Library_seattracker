name: Server Health Check

on:
  schedule:
    - cron: "0 * * * *"   # 매 시간 (UTC)
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check server status
        id: health
        run: |
          body=$(curl -s --max-time 10 "${{ secrets.CLOUDTYPE_URL }}/status" || echo "")
          echo "body: $body"
          if echo "$body" | grep -q '"ok"'; then
            echo "alive=true" >> "$GITHUB_OUTPUT"
            echo "Server is alive"
          else
            echo "alive=false" >> "$GITHUB_OUTPUT"
            echo "Server is down"
          fi

      - name: Redeploy server if down
        if: steps.health.outputs.alive != 'true'
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: dongjak-public-library-seattracker
          stage: main
          file: ./cloudtype.yaml

      - name: Wait for redeploy
        if: steps.health.outputs.alive != 'true'
        run: |
          echo "Redeployed. Waiting 90s..."
          sleep 90

      - name: Verify after restart
        if: steps.health.outputs.alive != 'true'
        run: |
          body=$(curl -s --max-time 10 "${{ secrets.CLOUDTYPE_URL }}/status" || echo "")
          if echo "$body" | grep -q '"ok"'; then
            echo "Server recovered successfully"
          else
            echo "Server still down after restart"
            exit 1
          fi
