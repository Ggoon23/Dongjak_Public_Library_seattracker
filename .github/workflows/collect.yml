name: Collect Seat Data

on:
  schedule:
    - cron: "*/10 * * * *"   # л§Ө 10л¶„л§ҲлӢӨ (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # в”Җв”Җ 1. м„ңлІ„ мғҒнғң нҷ•мқё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Check server status
        id: health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.CLOUDTYPE_URL }}/status" || echo "000")
          echo "http_code=$code" >> "$GITHUB_OUTPUT"
          echo "Server responded: $code"

      # в”Җв”Җ 2. кәјм ё мһҲмңјл©ҙ ctype CLIлЎң мһ¬мӢңмһ‘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Restart server if down
        if: steps.health.outputs.http_code != '200'
        run: |
          npm install -g @cloudtype/cli --silent
          ctype auth:login --token "${{ secrets.CLOUDTYPE_TOKEN }}"
          ctype app:restart --name djlib-seat-server
          echo "Waiting 30s for server to start..."
          sleep 30

      # в”Җв”Җ 3. мҲҳм§‘ мҡ”мІӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Collect data
        id: collect
        run: |
          response=$(curl -s --max-time 25 "${{ secrets.CLOUDTYPE_URL }}/collect")
          echo "response=$response" >> "$GITHUB_OUTPUT"
          echo "Response: $response"

      # в”Җв”Җ 4. мқ‘лӢө мІҳлҰ¬ (Python) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Process response
        id: process
        run: |
          python3 - <<'PYEOF'
          import json, csv, os, sys
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          CSV_PATH  = "data/seats.csv"
          LOG_PATH  = "logs/error.log"
          FIELDNAMES = ["collected_at", "room_name", "used_seats", "waiting"]

          raw = os.environ.get("COLLECT_RESPONSE", "")
          try:
              resp = json.loads(raw)
          except json.JSONDecodeError:
              resp = {"status": "error", "message": f"invalid json: {raw[:200]}"}

          status = resp.get("status")

          # в”Җв”Җ no_data: м»Өл°Ӣ м—ҶмқҢ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          if status == "no_data":
              print("no_data: skip commit")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_commit=false\n")
                  f.write("commit_msg=\n")
              sys.exit(0)

          # в”Җв”Җ error: error.logм—җ кё°лЎқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          if status == "error":
              ts = datetime.now(KST).strftime("%Y-%m-%d %H:%M:%S")
              msg = resp.get("message", "unknown error")
              os.makedirs("logs", exist_ok=True)
              with open(LOG_PATH, "a") as f:
                  f.write(f"{ts} | [ERROR] {msg}\n")
              print(f"Error logged: {msg}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_commit=true\n")
                  f.write(f"commit_msg=log: error at {ts}\n")
              sys.exit(0)

          # в”Җв”Җ ok: CSVм—җ append в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          rows = resp.get("data", [])
          if not rows:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_commit=false\n")
              sys.exit(0)

          # кё°мЎҙ (collected_at, room_name) мӨ‘ліө нҷ•мқё
          existing = set()
          if os.path.exists(CSV_PATH):
              with open(CSV_PATH, newline="", encoding="utf-8") as f:
                  for r in csv.DictReader(f):
                      existing.add((r["collected_at"], r["room_name"]))

          new_rows = [r for r in rows
                      if (r["collected_at"], r["room_name"]) not in existing]

          if not new_rows:
              print(f"skip: all {len(rows)} rows already exist")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_commit=false\n")
              sys.exit(0)

          os.makedirs("data", exist_ok=True)
          file_exists = os.path.exists(CSV_PATH)
          with open(CSV_PATH, "a", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=FIELDNAMES)
              if not file_exists:
                  writer.writeheader()
              writer.writerows(new_rows)

          ts = new_rows[0]["collected_at"]
          print(f"ok: {len(new_rows)} rows appended (at {ts})")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("should_commit=true\n")
              f.write(f"commit_msg=data: collect {ts} ({len(new_rows)} rows)\n")
          PYEOF
        env:
          COLLECT_RESPONSE: ${{ steps.collect.outputs.response }}

      # в”Җв”Җ 5. ліҖкІҪмӮ¬н•ӯ мһҲмқ„ л•Ңл§Ң м»Өл°Ӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Commit changes
        if: steps.process.outputs.should_commit == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seats.csv logs/error.log
          git commit -m "${{ steps.process.outputs.commit_msg }}"
          git push
