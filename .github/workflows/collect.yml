name: Collect Seat Data

on:
  schedule:
    - cron: "0,10,20,30,40,50 * * * *"   # 매 10분마다 실행 (UTC 기준)
  workflow_dispatch:          # 수동 실행 허용

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        id: scraper
        run: |
          output=$(python scraper/scraper.py 2>&1)
          echo "$output"
          if echo "$output" | grep -q "^NEW_DATA=true"; then
            echo "new_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit new data
        if: steps.scraper.outputs.new_data == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seats.csv
          git commit -m "chore: collect seat data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
